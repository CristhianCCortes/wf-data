name: Actualizar manifest (sha256 y size)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 1 * *"  # día 1 de cada mes 09:00 UTC

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Actualizar manifest.json
        shell: bash
        run: |
          python3 - << 'PY'
          import json, hashlib, urllib.request

          MANIFEST_PATH = "manifest.json"

          with open(MANIFEST_PATH, "r", encoding="utf-8") as f:
            manifest = json.load(f)

          def fetch(url):
            with urllib.request.urlopen(url) as r:
              return r.read()

          for key, src in manifest.get("sources", {}).items():
            url = src["url"]
            data = fetch(url)
            src["sha256"] = hashlib.sha256(data).hexdigest()
            src["size"] = len(data)

          with open(MANIFEST_PATH, "w", encoding="utf-8") as f:
            json.dump(manifest, f, ensure_ascii=False, indent=2)

          print("manifest.json actualizado")
          PY

      - name: Commit y push si hay cambios
        run: |
          if git diff --quiet; then
            echo "No hay cambios."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Actualizar manifest: sha256 y size"
          git push
