name: Reconstruir manifest.json (manual)

on:
  workflow_dispatch:
    inputs:
      carpeta:
        description: "Carpeta dentro de sources (ej: 2026.04.03)"
        required: true
        default: "2026.04.03"

jobs:
  build-manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Descargar repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generar manifest.json desde sources/<carpeta>
        env:
          CARPETA: ${{ github.event.inputs.carpeta }}
        run: |
          python - << 'PY'
          import os, json, hashlib

          carpeta = os.environ["CARPETA"].strip()
          base_dir = os.path.join("sources", carpeta)

          if not os.path.isdir(base_dir):
            raise SystemExit(f"No existe la carpeta: {base_dir}")

          def sha256_file(path):
            h = hashlib.sha256()
            with open(path, "rb") as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b""):
                h.update(chunk)
            return h.hexdigest()

          sources = {}
          for fn in sorted(os.listdir(base_dir)):
            if not fn.lower().endswith(".json"):
              continue
            path = os.path.join(base_dir, fn)
            sources[fn] = {
              "version": carpeta,
              "url": f"https://cdn.jsdelivr.net/gh/{os.environ['GITHUB_REPOSITORY']}@main/{base_dir}/{fn}",
              "sha256": sha256_file(path),
              "size": os.path.getsize(path)
            }

          manifest = {
            "schemaVersion": 1,
            "generatedAt": carpeta,
            "sources": sources
          }

          with open("manifest.json", "w", encoding="utf-8") as f:
            json.dump(manifest, f, ensure_ascii=False, indent=2)

          print(f"OK: manifest.json generado con {len(sources)} archivos.")
          PY

      - name: Commit y push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Reconstruir manifest.json (${CARPETA})" || echo "Sin cambios"
          git push
